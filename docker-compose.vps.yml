# DEPRECATED: Use docker-compose.full.yml for the full VPS stack (lm.planetfinance.cloud).
# This file kept for reference only — it was the backend-only Vercel+VPS split setup.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ownnblm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ownnblm}
      POSTGRES_DB: ownnblm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ownnblm"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./backend
    ports:
      - "8010:8000"
    env_file: .env
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://ownnblm:${POSTGRES_PASSWORD:-ownnblm}@postgres:5432/ownnblm
      CORS_ORIGINS: https://lm.planetfinance.cloud
      FRONTEND_URL: https://lm.planetfinance.cloud
    volumes:
      - api_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

volumes:
  pgdata:
  api_data:
