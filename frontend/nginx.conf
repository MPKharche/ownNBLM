server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (Caddy also sets these, belt-and-suspenders for direct access)
    add_header X-Content-Type-Options "nosniff" always;

    # API — forward to FastAPI (used when nginx is the outermost proxy, e.g. docker-compose.prod.yml)
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE / streaming — disable nginx response buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
    }

    # React SPA — serve static files, fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache immutable assets (Vite hashes filenames)
    location ~* \.(?:js|css|woff2?|svg|ico|png|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the HTML entry point
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
