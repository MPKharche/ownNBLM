<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ownNBLM — Temporarily paused</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c0f14;
        --fg: #e8eaed;
        --muted: #9aa0a6;
        --accent: #5b8def;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
        padding: 2rem;
      }
      main {
        max-width: 28rem;
        text-align: center;
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0 0 1rem;
        line-height: 1.6;
        color: var(--muted);
      }
      .badge {
        display: inline-block;
        margin-bottom: 1.25rem;
        padding: 0.35rem 0.75rem;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        background: rgba(91, 141, 239, 0.15);
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">Maintenance</div>
      <h1>ownNBLM is paused</h1>
      <p>
        The application and API are temporarily offline while we prepare the next release.
        Your data on our servers is preserved.
      </p>
      <p>Check back soon, or contact the team if you need access.</p>
    </main>
  </body>
</html>
