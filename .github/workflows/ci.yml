name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: |
          python -m pip install -e backend
          python -m pip install pytest httpx
      - name: Pytest (no live LLM)
        env:
          OPENROUTER_API_KEY: ""
        run: |
          cd backend
          python -m pytest tests/test_health.py tests/test_rate_limit.py -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install & build
        run: |
          cd frontend
          npm ci
          npm run build
