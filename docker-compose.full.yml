# Full-stack VPS deployment — lm.planetfinance.cloud
# Caddy handles TLS; all services are internal (no exposed ports except Caddy 80/443)
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    # No port exposed — Caddy reaches it via Docker network

  api:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://ownnblm:${POSTGRES_PASSWORD:-ownnblm}@postgres:5432/ownnblm
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: https://lm.planetfinance.cloud
      FRONTEND_URL: https://lm.planetfinance.cloud
    volumes:
      - api_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ownnblm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ownnblm}
      POSTGRES_DB: ownnblm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ownnblm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru

volumes:
  pgdata:
  api_data:
  caddy_data:
  caddy_config:
